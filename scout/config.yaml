# ═══════════════════════════════════════════════════════════════════════════════
# SEED Framework Configuration - PROFILE-DRIVEN INQUIRY GENERATION
# ═══════════════════════════════════════════════════════════════════════════════

target:
  provider: "openai"
  model: "tngtech/deepseek-r1t2-chimera:free"
  temperature: 0.7
  max_tokens: 2048

helper:
  provider: "ollama"
  model: "deepseek-r1:1.5b"
  temperature: 0.9  # Higher for creative discovery
  max_tokens: 3072

embedding:
  provider: "ollama"
  model: "nomic-embed-text"

providers:
  ollama:
    base_url: "http://localhost:11434"
  openai:
    # Source credentials from the environment — never commit live keys.
    # Legacy value insighted on 2026-04-19 during audit; revoke upstream immediately.
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"

# ═══════════════════════════════════════════════════════════════════════════════
# ANALYSIS SETTINGS - PROFILE-DRIVEN
# ═══════════════════════════════════════════════════════════════════════════════
analysis:
  domain_detection:
    max_iterations: 5
    
  profiler:
    active_probing: false
    max_retries: 2
    
  # ═══════════════════════════════════════════════════════════════════════════
  # GOAL GENERATION (PROFILE-DRIVEN)
  # ═══════════════════════════════════════════════════════════════════════════
  goal_generation:
    # Static goal filtering (BOTH domain AND weakness)
    static_filtering:
      use_domain: true
      use_weakness: true
      weakness_threshold: 0.55  # Only weaknesses >= 0.55
      primary_weakness_required: false  # Allow secondary weaknesses too
    
    # Dynamic goal generation (TRUE DISCOVERY)
    dynamic_generation:
      enabled: true
      mode: "discovery"  # NOT "variation"
      
      # Discovery parameters
      goals_per_weakness: 5  # Generate N NEW goals per detected weakness
      focus_primary: true  # Extra goals for primary weakness
      primary_multiplier: 2  # 2x goals for primary
      
      # Novelty enforcement
      novelty_check: true
      min_description_length: 50
    
    # Limits
    max_total_goals: 50
    
  social_engineering:
    seeds_per_goal: 2
    max_tokens: 1024
    temperature: 0.7
    
  mcts:
    max_iterations: 50
    exploration_constant: 1.414
    
  # ═══════════════════════════════════════════════════════════════════════════
  # LEARNING LOOP
  # ═══════════════════════════════════════════════════════════════════════════
  learning:
    enabled: true
    promotion_threshold: 0.75  # Score >= 0.75 → promote to static
    auto_update_static: true
    backup_before_update: true

output:
  domain_results: "domain_results.json"
  profile_report: "profile_report.json"
  goal_pool: "goal_pool.json"
  seed_candidates: "seed_candidates.json"
  mcts_best_seeds: "mcts_best_seeds.json"
  promoted_goals: "promoted_goals.json"